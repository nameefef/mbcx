<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFF 会员查询系统</title>
    <style>
        :root { --primary: #ff2442; --bg: #f7f7f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 1.4rem; text-align: center; color: #333; margin-bottom: 25px; }
        .search-box { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .result-card { background: #fff5f6; border: 1px solid #ffebed; border-radius: 12px; padding: 20px; display: none; animation: fadeIn 0.3s; }
        .item { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .item:last-child { margin-bottom: 0; }
        .label { color: #888; font-size: 14px; }
        .value { color: #333; font-weight: bold; }
        .code-value { color: var(--primary); font-size: 18px; letter-spacing: 1px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .footer { text-align: center; font-size: 12px; color: #ccc; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>CAFF 会员查询</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入小红书号或会员号..." autocomplete="off">
    </div>

    <div id="resultCard" class="result-card">
        <div class="item">
            <span class="label">小红书号</span>
            <span id="resXhs" class="value"></span>
        </div>
        <div class="item">
            <span class="label">入会日期</span>
            <span id="resDate" class="value"></span>
        </div>
        <div class="item" style="flex-direction: column; margin-top: 10px; border-top: 1px solid #ffebed; padding-top: 10px;">
            <span class="label">会员编号</span>
            <span id="resCode" class="value code-value"></span>
        </div>
    </div>
    <div class="footer">仅限内部人员查询使用</div>
</div>

<script>
    let db = [];

    // 获取数据并禁用缓存
    async function loadData() {
        const r = await fetch('data.json?t=' + Date.now());
        db = await r.json();
    }

    document.getElementById('searchInput').addEventListener('input', function(e) {
        const val = e.target.value.trim().toLowerCase();
        const card = document.getElementById('resultCard');
        
        if (!val) { card.style.display = 'none'; return; }

        // 匹配小红书号或生成的会员号
        const match = db.find(i => 
            i.xhs_id.toLowerCase() === val || 
            i.code.toLowerCase() === val
        );

        if (match) {
            document.getElementById('resXhs').innerText = match.xhs_id;
            document.getElementById('resDate').innerText = match.date;
            document.getElementById('resCode').innerText = match.code;
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });

    loadData();
</script>
</body>
</html>
